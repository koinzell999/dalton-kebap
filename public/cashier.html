<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasiyer — Dalton's Kebap</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #060f0a;
      --card:   #081208;
      --border: #0e2a14;
      --green:  #22c55e;
      --yellow: #fcd34d;
      --orange: #f59e0b;
      --text:   #e8fdf0;
      --muted:  #6aac82;
      --red:    #ef4444;
      --paid-bg:    #070f07;
      --paid-border:#0a1c0a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Open Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── PIN GATE ─────────────────────────────── */

    .pin-gate {
      position: fixed;
      inset: 0;
      background: #030a05;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .pin-card {
      background: #081208;
      border: 2px solid var(--green);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: min(340px, 90vw);
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .pin-card h2 {
      font-family: 'Oswald', sans-serif;
      font-size: 1.35rem;
      color: var(--green);
      letter-spacing: 1px;
    }

    .pin-card p { color: var(--muted); font-size: 0.88rem; }

    .pin-input {
      background: #060f0a;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1.2rem;
      padding: 0.65rem 1rem;
      text-align: center;
      letter-spacing: 4px;
      width: 100%;
      font-family: 'Open Sans', sans-serif;
    }
    .pin-input:focus { outline: 2px solid var(--green); border-color: transparent; }

    .pin-btn {
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 1px;
      padding: 0.7rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .pin-btn:hover { opacity: 0.88; }

    .pin-error { color: var(--red); font-size: 0.82rem; min-height: 1.2em; }

    /* ── HEADER ─────────────────────────────── */

    .header {
      background: #040a05;
      border-bottom: 2px solid var(--green);
      padding: 0.75rem 1.25rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.6rem;
    }

    .header-brand {
      font-family: 'Oswald', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 2px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }
    .status-dot.connected    { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.connecting   { background: var(--yellow); animation: blink 1s ease-in-out infinite; }
    .status-dot.disconnected { background: var(--red); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── STATS ROW ─────────────────────────────── */

    .stats-row {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: rgba(34,197,94,.12);
      border: 1px solid rgba(34,197,94,.3);
      border-radius: 8px;
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .stat-chip span {
      font-family: 'Oswald', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--green);
      margin-left: 0.25rem;
    }
    .stat-chip.highlight span { color: var(--yellow); }
    .stat-chip.revenue   span { color: #86efac; }

    @media (max-width: 480px) {
      .stats-row { display: grid; grid-template-columns: 1fr 1fr; }
    }

    /* ── TABS ─────────────────────────────── */

    .tabs {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: var(--header-h, 110px);
      z-index: 90;
    }

    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 0.5rem 1rem 0.6rem;
      font-family: 'Oswald', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn.active { color: var(--green); border-bottom-color: var(--green); }
    .tab-btn:hover:not(.active) { color: var(--text); }

    .tab-count {
      background: rgba(34,197,94,.2);
      color: var(--green);
      border-radius: 10px;
      font-size: 0.72rem;
      padding: 0.1rem 0.45rem;
      margin-left: 0.3rem;
      font-family: 'Open Sans', sans-serif;
      font-weight: 700;
    }

    /* ── MAIN ─────────────────────────────── */

    .main { padding: 1.25rem; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .empty {
      text-align: center;
      padding: 4rem 1rem;
    }
    .empty-icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .empty p { color: var(--muted); font-size: 1rem; }

    /* ── ORDERS GRID ─────────────────────────────── */

    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(300px, 100%), 1fr));
      gap: 1rem;
      align-items: start;
    }

    /* ── ORDER CARD ─────────────────────────────── */

    .order-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: slideIn 0.3s ease;
      transition: box-shadow 0.3s;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .order-card.status-served {
      border-color: var(--green);
      box-shadow: 0 0 18px rgba(34,197,94,.25);
    }

    .order-card.status-preparing {
      border-color: rgba(251,191,36,.5);
    }

    .order-card.status-pending {
      border-color: rgba(245,158,11,.25);
    }

    /* ── SERVED ALERT FLASH ─────────────────────── */
    @keyframes alertPulse {
      0%,100% { box-shadow: 0 0 18px rgba(34,197,94,.25); }
      40%     { box-shadow: 0 0 48px rgba(34,197,94,.95); }
    }
    .alert-flash { animation: alertPulse 0.65s ease 3; }

    .card-head {
      padding: 0.85rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .status-served    .card-head { background: rgba(34,197,94,.08); }
    .status-preparing .card-head { background: rgba(251,191,36,.08); }
    .status-pending   .card-head { background: rgba(245,158,11,.04); }

    .table-num {
      font-family: 'Oswald', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 1px;
      line-height: 1.15;
    }
    .status-served    .table-num { color: var(--green); }
    .status-preparing .table-num { color: #fbbf24; }
    .status-pending   .table-num { color: var(--yellow); }

    .order-ref {
      display: block;
      font-size: 0.78rem;
      color: var(--orange);
      letter-spacing: 2px;
      font-weight: 600;
      margin-top: 1px;
    }

    .status-badge {
      font-family: 'Oswald', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 0.25rem 0.65rem;
      border-radius: 20px;
    }
    .badge-served    { background: rgba(34,197,94,.2);  color: var(--green); }
    .badge-preparing { background: rgba(251,191,36,.2); color: #fbbf24; }
    .badge-pending   { background: rgba(245,158,11,.15); color: var(--orange); }

    .card-items {
      padding: 0.75rem 1rem;
      flex: 1;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.25rem 0;
      font-size: 0.88rem;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .item-row:last-child { border-bottom: none; }

    .item-name  { flex: 1; color: var(--text); }
    .item-qty   { color: var(--orange); font-weight: 700; font-size: 0.82rem; margin: 0 0.5rem; white-space: nowrap; }
    .item-price { color: var(--muted); font-size: 0.82rem; white-space: nowrap; }

    .card-foot {
      padding: 0.85rem 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .btn-close { flex-shrink: 0; }

    .total-col { display: flex; flex-direction: column; }
    .total-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
    .total-amount {
      font-family: 'Oswald', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--yellow);
    }

    .btn-close {
      border: none;
      padding: 0.55rem 1.1rem;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.88rem;
      cursor: pointer;
      font-family: 'Oswald', sans-serif;
      letter-spacing: 0.5px;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      min-height: 44px;
      white-space: nowrap;
    }
    .btn-close.served  { background: var(--green); color: #000; }
    .btn-close.pending { background: rgba(245,158,11,.25); color: var(--orange); border: 1px solid rgba(245,158,11,.4); }
    .btn-close:hover:not(:disabled) { opacity: 0.85; }
    .btn-close:active:not(:disabled) { transform: scale(0.97); }
    .btn-close:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── HISTORY (PAID) CARDS ─────────────────────────────── */

    .paid-card {
      background: var(--paid-bg);
      border: 1px solid var(--paid-border);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 0.5rem 0.75rem;
      font-size: 0.875rem;
      color: var(--muted);
      animation: slideIn 0.25s ease;
    }

    @media (max-width: 480px) {
      .paid-card {
        grid-template-columns: auto 1fr;
      }
      .paid-total { grid-column: 1; }
      .paid-time  { grid-column: 2; text-align: right; }
    }

    .paid-table {
      font-family: 'Oswald', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #3a6344;
      white-space: nowrap;
      line-height: 1.2;
    }

    .paid-ref {
      display: block;
      font-size: 0.7rem;
      color: #2a5038;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .paid-items { min-width: 0; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .paid-total {
      font-family: 'Oswald', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: #3a6344;
      white-space: nowrap;
    }

    .paid-time { font-size: 0.72rem; color: #2a4a30; white-space: nowrap; }

    .paid-grid {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* ── CANCELLED CARDS ─────────────────────────────────── */

    .cancelled-card {
      background: rgba(239,68,68,.04);
      border: 1px solid rgba(239,68,68,.18);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 0.5rem 0.75rem;
      font-size: 0.875rem;
      color: var(--muted);
      animation: slideIn 0.25s ease;
    }

    @media (max-width: 480px) {
      .cancelled-card { grid-template-columns: auto 1fr; }
      .cancelled-total { grid-column: 1; }
      .cancelled-time  { grid-column: 2; text-align: right; }
    }

    .cancelled-table {
      font-family: 'Oswald', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: rgba(239,68,68,.7);
      white-space: nowrap;
      line-height: 1.2;
    }
    .cancelled-ref {
      display: block;
      font-size: 0.7rem;
      color: rgba(239,68,68,.45);
      letter-spacing: 1px;
      font-weight: 600;
    }
    .cancelled-items { min-width: 0; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cancelled-total {
      font-family: 'Oswald', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      color: rgba(239,68,68,.6);
      white-space: nowrap;
      text-decoration: line-through;
    }
    .cancelled-time { font-size: 0.72rem; color: rgba(239,68,68,.35); white-space: nowrap; }

    .fade-out {
      animation: fadeOut 0.4s ease forwards;
      pointer-events: none;
    }
    @keyframes fadeOut { to { opacity: 0; transform: scale(0.97); } }

    /* ── TABLE GROUP HEADER ───────────────────────────── */
    .table-group-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding: 0.5rem 0.9rem;
      background: rgba(34,197,94,.06);
      border: 1px dashed rgba(34,197,94,.25);
      border-radius: 8px;
      margin-bottom: -0.25rem;
    }
    .table-group-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 1px;
    }
    .table-group-meta {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .btn-close-all {
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 0.4rem 1rem;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      white-space: nowrap;
      min-height: 38px;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .btn-close-all:hover:not(:disabled) { opacity: 0.85; }
    .btn-close-all:disabled { opacity: 0.4; cursor: not-allowed; }

    @media (max-width: 400px) {
      .table-group-header { flex-direction: column; align-items: stretch; gap: 0.5rem; }
      .btn-close-all      { width: 100%; text-align: center; }
    }

    /* ── INLINE CONFIRM ROW ───────────────────────────── */
    .confirm-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding-top: 0.6rem;
      border-top: 1px solid var(--border);
      margin-top: 0.4rem;
    }
    .confirm-msg { flex: 1; font-size: 0.82rem; color: var(--muted); }
    .btn-cyes {
      background: var(--green); color: #000; border: none;
      border-radius: 6px; padding: 0.4rem 0.9rem;
      font-family: 'Oswald', sans-serif; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; white-space: nowrap;
    }
    .btn-cyes:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-cno {
      background: transparent; border: 1px solid var(--muted); color: var(--muted);
      border-radius: 6px; padding: 0.4rem 0.9rem;
      font-family: 'Oswald', sans-serif; font-size: 0.82rem;
      cursor: pointer; white-space: nowrap;
    }
    .btn-cno:hover { border-color: var(--text); color: var(--text); }

    .card-notes {
      margin: 0 1rem 0.6rem;
      background: rgba(245,158,11,.08);
      border-left: 3px solid var(--orange);
      border-radius: 0 6px 6px 0;
      padding: 0.45rem 0.65rem;
      font-size: 0.8rem;
      color: var(--orange);
    }

    @media (max-width: 360px) {
      .confirm-row { flex-direction: column; align-items: stretch; }
      .btn-cyes, .btn-cno { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

<!-- PIN gate -->
<div id="pin-gate" class="pin-gate">
  <div class="pin-card">
    <h2>🔒 KASİYER PANELİ</h2>
    <p>Erişmek için PIN girin</p>
    <input type="password" id="pin-input" class="pin-input" maxlength="10" placeholder="••••" autocomplete="off">
    <button id="pin-btn" class="pin-btn">Giriş</button>
    <p id="pin-error" class="pin-error"></p>
  </div>
</div>

<header class="header" id="header" hidden>
  <div class="header-top">
    <div class="header-brand">💵 KASİYER PANELİ</div>
    <div class="status-row">
      <span id="status-dot" class="status-dot connecting"></span>
      <span id="status-text">Bağlanıyor...</span>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-chip">Açık Masa <span id="stat-open">0</span></div>
    <div class="stat-chip highlight">Ödeme Bekliyor <span id="stat-ready">0</span></div>
    <div class="stat-chip">Açık Toplam <span id="stat-open-total">0 ₺</span></div>
    <div class="stat-chip revenue">Günlük Ciro <span id="stat-revenue">0 ₺</span></div>
  </div>
</header>

<div class="tabs" id="tabs" hidden>
  <button class="tab-btn active" data-tab="open">
    Açık Siparişler <span class="tab-count" id="tab-open-count">0</span>
  </button>
  <button class="tab-btn" data-tab="paid">
    Ödendi <span class="tab-count" id="tab-paid-count">0</span>
  </button>
  <button class="tab-btn" data-tab="cancelled">
    İptal <span class="tab-count" id="tab-cancelled-count">0</span>
  </button>
</div>

<main class="main" id="main-content" hidden>
  <!-- OPEN ORDERS TAB -->
  <div id="tab-open" class="tab-panel active">
    <div id="empty-open" class="empty" style="display:none">
      <div class="empty-icon">🎉</div>
      <p>Açık sipariş yok — tüm masalar temiz!</p>
    </div>
    <div id="grid-open" class="orders-grid"></div>
  </div>

  <!-- PAID HISTORY TAB -->
  <div id="tab-paid" class="tab-panel">
    <div id="empty-paid" class="empty" style="display:none">
      <div class="empty-icon">📋</div>
      <p>Bugün henüz ödeme alınmadı.</p>
    </div>
    <div id="grid-paid" class="paid-grid"></div>
  </div>

  <!-- CANCELLED TAB -->
  <div id="tab-cancelled" class="tab-panel">
    <div id="empty-cancelled" class="empty" style="display:none">
      <div class="empty-icon">✅</div>
      <p>Bugün iptal edilen sipariş yok.</p>
    </div>
    <div id="grid-cancelled" class="paid-grid"></div>
  </div>
</main>

<!-- Synchronous PIN check -->
<script>
  var CASHIER_PIN = '130791';
  var PIN_SESSION_KEY = 'dk:cashier-pin';

  function escHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
  window.escHtml = escHtml;

  function showApp() {
    document.getElementById('pin-gate').style.display = 'none';
    ['header','tabs','main-content'].forEach(function(id) {
      document.getElementById(id).removeAttribute('hidden');
    });
  }

  if (sessionStorage.getItem(PIN_SESSION_KEY) === '1') showApp();

  document.getElementById('pin-btn').addEventListener('click', function() {
    var val = document.getElementById('pin-input').value;
    if (val === CASHIER_PIN) {
      sessionStorage.setItem(PIN_SESSION_KEY, '1');
      showApp();
    } else {
      document.getElementById('pin-error').textContent = 'Yanlış PIN, tekrar deneyin.';
      document.getElementById('pin-input').value = '';
      document.getElementById('pin-input').focus();
    }
  });

  document.getElementById('pin-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('pin-btn').click();
  });

  // Reload at 04:30 — half-hour after the restaurant closes (04:00).
  // Avoids disrupting service (old midnight reload fired while tables were still open).
  (function scheduleCloseReload() {
    var now    = new Date();
    var reload = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 4, 30, 0);
    if (now >= reload) reload.setDate(reload.getDate() + 1); // already past today's 04:30
    setTimeout(function() { window.location.reload(); }, reload - now);
  })();
</script>

// ── Notification permission ───────────────────────────────────────────────
let notifPermission = Notification.permission;
function askNotifPermission() {
  if (notifPermission === 'default') {
    Notification.requestPermission().then(p => { notifPermission = p; });
  }
}
document.addEventListener('click', askNotifPermission, { once: true });

// ── Audio alert (two rising tones) ───────────────────────────────────────
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx || _audioCtx.state === 'closed') {
    try { _audioCtx = new AudioContext(); } catch { return null; }
  }
  return _audioCtx;
}

function playAlert() {
  try {
    const ctx = getAudioCtx();
    if (!ctx) return;
    if (ctx.state === 'suspended') ctx.resume();
    [[660, 0], [880, 0.22]].forEach(([freq, delay]) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + delay;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.4, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      osc.start(t); osc.stop(t + 0.6);
    });
  } catch {}
}

function fireNotification(title, body, tag) {
  if (Notification.permission !== 'granted') return;
  try {
    const n = new Notification(title, {
      body,
      icon: '/favicon.ico',
      requireInteraction: true,
      tag,
    });
    n.onclick = () => { window.focus(); n.close(); };
  } catch {}
}

function alertCashier(order) {
  playAlert();
  fireNotification(

    order.id

}

// ── Live order state ──────────────────────────────────────────────────────
const openOrdersMap = new Map();  // id → latest order object (refreshed every snapshot)
const prevStatusMap = new Map();  // id → previous status (detects pending→served transitions)
let firstOpenLoad   = true;

function setStatus(s) {
  statusDot.className = 'status-dot ' + s;
  statusText.textContent = { connected:'Bağlı', connecting:'Bağlanıyor…', disconnected:'Bağlantı kesildi' }[s] || s;
}

function padNum(n) {
  return n != null ? '#' + String(n).padStart(3, '0') : '';
}

function fmtPrice(p) {
  const n = parseFloat(String(p ?? 0).replace(/[^\d.]/g, ''));
  return isNaN(n) ? '—' : `${n.toLocaleString('tr-TR')} ₺`;
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = ts.toDate();
  return d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
}

const STATUS_SORT = { served: 0, preparing: 1, pending: 2 };

function sortOpen(orders) {
  const tableHasServed = {};
  orders.forEach(o => { if (o.status === 'served') tableHasServed[o.table_id] = true; });

  return [...orders].sort((a, b) => {
    const aReady = !!tableHasServed[a.table_id];
    const bReady = !!tableHasServed[b.table_id];
    if (aReady !== bReady) return aReady ? -1 : 1;
    if (a.table_id !== b.table_id) return a.table_id - b.table_id;
    const sa = STATUS_SORT[a.status] ?? 99;
    const sb = STATUS_SORT[b.status] ?? 99;
    if (sa !== sb) return sa - sb;
    return 0;
  });
}

// ── Open ticket rendering ─────────────────────────────────────────────────
function renderOpen(orders) {
  // Always keep openOrdersMap current so confirmClose/confirmCloseAll use live data
  openOrdersMap.clear();
  orders.forEach(o => openOrdersMap.set(o.id, o));

  const incoming = new Set(orders.map(o => o.id));

  gridOpen.querySelectorAll('.order-card').forEach(card => {
    if (!incoming.has(card.dataset.id)) {
      prevStatusMap.delete(card.dataset.id);
      card.classList.add('fade-out');
      card.addEventListener('animationend', () => card.remove(), { once: true });
    }
  });

  const sorted = sortOpen(orders);
  const newlyServed = [];

  sorted.forEach(order => {
    const prev        = prevStatusMap.get(order.id);
    const isNewServed = !firstOpenLoad && order.status === 'served' && (prev === 'pending' || prev === 'preparing');
    if (isNewServed) newlyServed.push(order);
    prevStatusMap.set(order.id, order.status);

    const existing = gridOpen.querySelector(`.order-card[data-id="${esc(order.id)}"]`);

    if (existing) {
      existing.className       = `order-card status-${order.status}`;
      existing.dataset.status  = order.status;
      existing.dataset.tableId = order.table_id;
      const badge = existing.querySelector('.status-badge');
      if (badge) {
        badge.className   = `status-badge badge-${order.status}`;
        badge.textContent = order.status === 'served' ? '✓ Hazır' : order.status === 'preparing' ? '👨‍🍳 Hazırlanıyor' : '⏳ Bekliyor';
      }
      const btn = existing.querySelector('.btn-close');
      if (btn && !existing.dataset.confirming) {
        btn.className   = `btn-close ${order.status}`;
        btn.textContent = order.status === 'served' ? '💳 Kapat ve Öde' : 'Kapat';
        btn.style.cssText = '';
      }
      // Refresh items/total if customer edited the order while it was pending
      if (!existing.dataset.confirming) {
        const items   = order.order_items || [];
        const itemsEl = existing.querySelector('.card-items');
        if (itemsEl) {
          itemsEl.innerHTML = items.length
            ? items.map(it => {
                const lineTotal = it.price * it.quantity;
                return `
                  <div class="item-row">
                    <span class="item-name">${esc(it.name)}</span>
                    <span class="item-qty">× ${esc(it.quantity)}</span>
                    <span class="item-price">${fmtPrice(lineTotal)}</span>
                  </div>`;
              }).join('')
            : '<span style="color:var(--muted);font-size:.85rem">—</span>';
        }
        const totalEl = existing.querySelector('.total-amount');
        if (totalEl) totalEl.textContent = fmtPrice(order.total_price);
        let notesEl = existing.querySelector('.card-notes');
        if (order.notes) {
          if (!notesEl) {
            notesEl = document.createElement('div');
            notesEl.className = 'card-notes';
            existing.querySelector('.card-foot').before(notesEl);
          }
          notesEl.textContent = '📝 ' + order.notes;
        } else if (notesEl) {
          notesEl.remove();
        }
      }
      if (isNewServed) {
        existing.classList.remove('alert-flash');
        void existing.offsetWidth; // restart animation
        existing.classList.add('alert-flash');
      }
      // Don't reposition card while a confirm dialog is open — avoids disorienting jump
      if (!existing.dataset.confirming) gridOpen.appendChild(existing);
      return;
    }

    const items = order.order_items || [];
    const card  = document.createElement('div');
    card.className       = `order-card status-${order.status}`;
    card.dataset.id      = order.id;
    card.dataset.status  = order.status;
    card.dataset.tableId = order.table_id;

    const itemsHTML = items.length
      ? items.map(it => {
          const lineTotal = it.price * it.quantity;
          return `
            <div class="item-row">
              <span class="item-name">${esc(it.name)}</span>
              <span class="item-qty">× ${esc(it.quantity)}</span>
              <span class="item-price">${fmtPrice(lineTotal)}</span>
            </div>`;
        }).join('')
      : '<span style="color:var(--muted);font-size:.85rem">—</span>';

    const isServed = order.status === 'served';

    card.innerHTML = `
      <div class="card-head">
        <div class="table-num">
          MASA ${esc(order.table_id)}
          ${order.order_number != null ? `<span class="order-ref">${esc(padNum(order.order_number))}</span>` : ''}
        </div>
        <div class="status-badge badge-${order.status}">
          ${order.status === 'served' ? '✓ Hazır' : order.status === 'preparing' ? '👨‍🍳 Hazırlanıyor' : '⏳ Bekliyor'}
        </div>
      </div>
      <div class="card-items">${itemsHTML}</div>
      ${order.notes ? `<div class="card-notes">📝 ${esc(order.notes)}</div>` : ''}
      <div class="card-foot">
        <div class="total-col">
          <span class="total-label">Toplam</span>
          <span class="total-amount">${fmtPrice(order.total_price)}</span>
        </div>
        <button class="btn-close ${order.status}">
          ${isServed ? '💳 Kapat ve Öde' : 'Kapat'}
        </button>
      </div>
    `;

    card.querySelector('.btn-close').addEventListener('click', () => confirmClose(order.id, card));
    gridOpen.appendChild(card);
  });

  newlyServed.forEach(o => alertCashier(o));
  firstOpenLoad = false;

  rebuildGroupHeaders(orders);

  const openTables  = new Set(orders.map(o => o.table_id)).size;
  // Count tables where at least one order is served (ready to pay)
  const readyTables = new Set(orders.filter(o => o.status === 'served').map(o => o.table_id)).size;
  const openTotal   = orders.reduce((s, o) => s + (parseFloat(String(o.total_price).replace(/[^\d.]/g,'')) || 0), 0);

  statOpen.textContent     = openTables;
  statReady.textContent    = readyTables;
  statOpenTot.textContent  = fmtPrice(openTotal);
  tabOpenCount.textContent = orders.length;

  emptyOpen.style.display = orders.length === 0 ? 'block' : 'none';
}

// ── Group headers for tables with >1 open order ───────────────────────────
function rebuildGroupHeaders(orders) {
  gridOpen.querySelectorAll('.table-group-header').forEach(h => h.remove());

  const byTable = {};
  orders.forEach(o => { (byTable[o.table_id] = byTable[o.table_id] || []).push(o); });

  Object.entries(byTable).forEach(([tableId, tableOrders]) => {
    if (tableOrders.length <= 1) return;
    const t         = +tableId;
    const firstCard = gridOpen.querySelector(`.order-card[data-table-id="${t}"]`);
    if (!firstCard) return;

    const total = tableOrders.reduce((s, o) => s + (parseFloat(String(o.total_price ?? 0).replace(/[^\d.]/g,'')) || 0), 0);
    const hdr   = document.createElement('div');
    hdr.className    = 'table-group-header';
    hdr.dataset.group = t;
    hdr.innerHTML = `
      <div>
        <span class="table-group-label">MASA ${esc(t)}</span>
        <span class="table-group-meta"> — ${tableOrders.length} sipariş · ${fmtPrice(total)}</span>
      </div>
      <button class="btn-close-all">💳 Tüm Masayı Kapat</button>
    `;
    // Pass tableId as number; confirmCloseAll reads live orders from openOrdersMap
    hdr.querySelector('.btn-close-all').addEventListener('click', () => confirmCloseAll(t, hdr));
    gridOpen.insertBefore(hdr, firstCard);
  });
}

// ── Inline confirmation — single ticket ───────────────────────────────────
function confirmClose(orderId, card) {
  if (card.dataset.confirming) return;

  // Block payment of orders not yet served — prevents skipping kitchen
  if (card.dataset.status === 'pending' || card.dataset.status === 'preparing') {
    const btn = card.querySelector('.btn-close');
    const orig = btn.textContent;
    btn.disabled         = true;
    btn.textContent      = card.dataset.status === 'preparing' ? '⚠ Mutfakta hazırlanıyor!' : '⚠ Henüz mutfakta hazır değil!';
    btn.style.background = 'rgba(239,68,68,.25)';
    btn.style.color      = 'var(--red)';
    btn.style.border     = '1px solid rgba(239,68,68,.5)';
    setTimeout(() => {
      btn.disabled  = false;
      btn.textContent = orig;
      btn.style.cssText = '';
    }, 2500);
    return;
  }

  card.dataset.confirming = '1';
  const btn = card.querySelector('.btn-close');
  btn.style.display = 'none';

  const row = document.createElement('div');
  row.className = 'confirm-row';
  row.innerHTML = `
    <span class="confirm-msg">Ödeme alındı mı?</span>
    <button class="btn-cyes">✓ Evet, Öde</button>
    <button class="btn-cno">İptal</button>
  `;
  card.querySelector('.card-foot').appendChild(row);

  row.querySelector('.btn-cyes').onclick = async () => {
    row.querySelector('.btn-cyes').disabled = true;
    // Use the freshest order from the live map, not a stale closure
    const order = openOrdersMap.get(orderId);
    try {
      await updateDoc(doc(db, 'orders', orderId), { status: 'paid' });
      if (order && !printCustomerReceipt(order)) {
        row.querySelector('.confirm-msg').textContent = 'Ödeme kaydedildi — fiş için:';
        const printBtn = document.createElement('button');
        printBtn.className   = 'btn-cyes';
        printBtn.textContent = '🖨 Fiş Yazdır';
        printBtn.style.marginTop = '0.35rem';
        printBtn.onclick = () => printCustomerReceipt(order);
        row.appendChild(printBtn);
      }
    } catch (err) {
      console.error(err);
      delete card.dataset.confirming;
      row.remove();
      btn.style.display = '';
    }
  };

  row.querySelector('.btn-cno').onclick = () => {
    delete card.dataset.confirming;
    row.remove();
    btn.style.display = '';
  };
}

// ── Inline confirmation — close all for one table ─────────────────────────
function confirmCloseAll(tableId, hdr) {
  if (hdr.dataset.confirming) return;
  hdr.dataset.confirming = '1';
  const btn = hdr.querySelector('.btn-close-all');
  btn.style.display = 'none';

  const row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;';
  row.innerHTML = `
    <span style="flex:1;font-size:.82rem;color:var(--muted)">Tüm masayı kapat?</span>
    <button class="btn-cyes">✓ Evet</button>
    <button class="btn-cno">İptal</button>
  `;
  hdr.appendChild(row);

  row.querySelector('.btn-cyes').onclick = async () => {
    row.querySelector('.btn-cyes').disabled = true;
    // Read live orders at click time — avoids race if new order arrived since header built
    const liveOrders    = [...openOrdersMap.values()].filter(o => o.table_id === tableId);
    const servedOrders   = liveOrders.filter(o => o.status === 'served');
    const notReadyOrders = liveOrders.filter(o => o.status === 'pending' || o.status === 'preparing');
    if (!liveOrders.length) {
      delete hdr.dataset.confirming;
      row.remove();
      btn.style.display = '';
      return;
    }
    // Block if any order is still pending or being prepared
    if (notReadyOrders.length > 0) {
      row.querySelector('.btn-cyes').disabled = false;
      const preparing = notReadyOrders.filter(o => o.status === 'preparing').length;
      const pending   = notReadyOrders.filter(o => o.status === 'pending').length;
      const parts     = [];
      if (preparing) parts.push(`${preparing} hazırlanıyor`);
      if (pending)   parts.push(`${pending} bekliyor`);
      row.querySelector('.confirm-msg').textContent = `⚠ ${parts.join(', ')} — henüz servis edilmedi!`;
      row.querySelector('.confirm-msg').style.color = 'var(--red)';
      return;
    }
    try {
      await Promise.all(servedOrders.map(o => updateDoc(doc(db, 'orders', o.id), { status: 'paid' })));
      if (!printTableReceipt(liveOrders)) {
        row.querySelector('span').textContent = 'Ödeme kaydedildi — fiş için:';
        const printBtn = document.createElement('button');
        printBtn.className   = 'btn-cyes';
        printBtn.textContent = '🖨 Masa Fişi';
        printBtn.style.marginTop = '0.35rem';
        printBtn.onclick = () => printTableReceipt(liveOrders);
        row.appendChild(printBtn);
      }
    } catch (err) {
      console.error(err);
      delete hdr.dataset.confirming;
      row.remove();
      btn.style.display = '';
    }
  };

  row.querySelector('.btn-cno').onclick = () => {
    delete hdr.dataset.confirming;
    row.remove();
    btn.style.display = '';
  };
}

// ── Print single-order customer receipt ───────────────────────────────────
function printCustomerReceipt(order) {
  const win = window.open('', '_blank', 'width=320,height=560');
  if (!win) return false;
  const now     = new Date();
  const timeStr = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  const dateStr = now.toLocaleDateString('tr-TR');
  const refStr  = order.order_number != null ? '#' + String(order.order_number).padStart(3,'0') : '';
  const rows = (order.order_items || []).map(it => `
    <tr>
      <td style="padding:2mm 0;vertical-align:top">${esc(it.name)}</td>
      <td style="text-align:center;white-space:nowrap;padding:2mm 3mm">×${esc(it.quantity)}</td>
      <td style="text-align:right;white-space:nowrap">${fmtPrice((it.price||0)*(it.quantity||1))}</td>
    </tr>`).join('');
  win.document.write(receiptHTML({ tableId: order.table_id, refs: refStr, rows, total: fmtPrice(order.total_price), dateStr, timeStr, label: 'ÖDEME FİŞİ' }));
  win.document.close();
  return true;
}

// ── Print combined receipt for whole table ────────────────────────────────
function printTableReceipt(tableOrders) {
  if (!tableOrders.length) return false;
  const win = window.open('', '_blank', 'width=320,height=640');
  if (!win) return false;
  const tableId = tableOrders[0].table_id;
  const refs    = tableOrders.map(o => o.order_number != null ? '#' + String(o.order_number).padStart(3,'0') : '').filter(Boolean).join(', ');
  const total   = tableOrders.reduce((s, o) => s + (parseFloat(String(o.total_price ?? 0).replace(/[^\d.]/g,'')) || 0), 0);

  // Merge items by name AND price to avoid wrong line totals if the same item had different prices
  const itemMap = {};
  tableOrders.flatMap(o => o.order_items || []).forEach(it => {
    const key = `${it.name}::${it.price ?? 0}`;
    if (itemMap[key]) itemMap[key].quantity += it.quantity;
    else itemMap[key] = { ...it };
  });
  const rows = Object.values(itemMap).map(it => `
    <tr>
      <td style="padding:2mm 0;vertical-align:top">${esc(it.name)}</td>
      <td style="text-align:center;white-space:nowrap;padding:2mm 3mm">×${esc(it.quantity)}</td>
      <td style="text-align:right;white-space:nowrap">${fmtPrice((it.price||0)*(it.quantity||1))}</td>
    </tr>`).join('');

  const now     = new Date();
  const timeStr = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  const dateStr = now.toLocaleDateString('tr-TR');
  win.document.write(receiptHTML({ tableId, refs, rows, total: fmtPrice(total), dateStr, timeStr, label: 'MASA FİŞİ' }));
  win.document.close();
  return true;
}

// ── Paid history rendering ────────────────────────────────────────────────
function renderPaid(orders) {
  const incoming = new Set(orders.map(o => o.id));

  gridPaid.querySelectorAll('.paid-card').forEach(card => {
    if (!incoming.has(card.dataset.id)) {
      card.classList.add('fade-out');
      card.addEventListener('animationend', () => card.remove(), { once: true });
    }
  });

  let revenue = 0;

  orders.forEach(order => {
    revenue += parseFloat(String(order.total_price ?? 0).replace(/[^\d.]/g, '')) || 0;

    if (gridPaid.querySelector(`[data-id="${esc(order.id)}"]`)) return;

    const items   = order.order_items || [];
    const summary = items.map(it => `${esc(it.name)} ×${esc(it.quantity)}`).join(', ');
    const card    = document.createElement('div');
    card.className  = 'paid-card';
    card.dataset.id = order.id;
    card.innerHTML  = `
      <div class="paid-table">
        MASA ${esc(order.table_id)}
        ${order.order_number != null ? `<span class="paid-ref">${esc(padNum(order.order_number))}</span>` : ''}
      </div>
      <div class="paid-items">${summary || '—'}</div>
      <div class="paid-total">${fmtPrice(order.total_price)}</div>
      <div class="paid-time">${fmtTime(order.timestamp)}</div>
    `;
    gridPaid.appendChild(card);
  });

  statRevenue.textContent  = fmtPrice(revenue);
  tabPaidCount.textContent = orders.length;
  emptyPaid.style.display  = orders.length === 0 ? 'block' : 'none';
}

// ── Cancelled orders rendering ────────────────────────────────────────────
function renderCancelled(orders) {
  const gridCancelled  = document.getElementById('grid-cancelled');
  const emptyCancelled = document.getElementById('empty-cancelled');
  const incoming       = new Set(orders.map(o => o.id));

  gridCancelled.querySelectorAll('.cancelled-card').forEach(card => {
    if (!incoming.has(card.dataset.id)) card.remove();
  });

  orders.forEach(order => {
    if (gridCancelled.querySelector(`[data-id="${esc(order.id)}"]`)) return;
    const items   = order.order_items || [];
    const summary = items.map(it => `${esc(it.name)} ×${esc(it.quantity)}`).join(', ');
    const card    = document.createElement('div');
    card.className  = 'cancelled-card';
    card.dataset.id = order.id;
    card.innerHTML  = `
      <div class="cancelled-table">
        MASA ${esc(order.table_id)}
        ${order.order_number != null ? `<span class="cancelled-ref">${esc(padNum(order.order_number))}</span>` : ''}
      </div>
      <div class="cancelled-items">${summary || '—'}</div>
      <div class="cancelled-total">${fmtPrice(order.total_price)}</div>
      <div class="cancelled-time">${fmtTime(order.timestamp)}</div>
    `;
    gridCancelled.appendChild(card);
  });

  tabCancelledCount.textContent = orders.length;
  emptyCancelled.style.display  = orders.length === 0 ? 'block' : 'none';
}

// ── Firestore listeners ───────────────────────────────────────────────────
setStatus('connecting');

// Open tickets: pending + served (no orderBy — avoids composite index, sorted client-side)
onSnapshot(
  query(collection(db, 'orders'), where('status', 'in', ['pending', 'preparing', 'served'])),
  snap => {
    setStatus('connected');
    renderOpen(snap.docs.map(d => ({ id: d.id, ...d.data() })));
  },
  err => { console.error(err); setStatus('disconnected'); }
);

// Business-day start: restaurant open 09:00–04:00.
// Before 09:00 the "today" revenue belongs to the previous evening.
function getBusinessDayStart() {
  const now   = new Date();
  const start = new Date(now);
  if (now.getHours() < 9) start.setDate(start.getDate() - 1);
  start.setHours(9, 0, 0, 0);
  return start;
}
const todayStart = getBusinessDayStart();

onSnapshot(
  query(
    collection(db, 'orders'),
    where('status', '==', 'paid'),
    where('timestamp', '>=', Timestamp.fromDate(todayStart)),
    orderBy('timestamp', 'desc'),
    limit(500)
  ),
  snap => renderPaid(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
  err  => {
    console.warn('Paid history index not ready, using fallback:', err.message);
    onSnapshot(
      query(collection(db, 'orders'), where('status', '==', 'paid'), limit(500)),
      snap => renderPaid(snap.docs.map(d => ({ id: d.id, ...d.data() })))
    );
  }
);

// Cancelled orders: today's cancellations, newest first, up to 200 entries
onSnapshot(
  query(
    collection(db, 'orders'),
    where('status', '==', 'cancelled'),
    where('timestamp', '>=', Timestamp.fromDate(todayStart)),
    orderBy('timestamp', 'desc'),
    limit(200)
  ),
  snap => renderCancelled(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
  err  => {
    console.warn('Cancelled index not ready, using fallback:', err.message);
    onSnapshot(
      query(collection(db, 'orders'), where('status', '==', 'cancelled'), limit(200)),
      snap => renderCancelled(snap.docs.map(d => ({ id: d.id, ...d.data() })))
    );
  }
);

// ── Tab switching ─────────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
});

// ── Sticky tabs offset ───────────────────────────────────────────────────
const hdr  = document.getElementById('header');
const tabs = document.getElementById('tabs');
new ResizeObserver(() => {
  tabs.style.top = hdr.offsetHeight + 'px';
}).observe(hdr);
</script>
